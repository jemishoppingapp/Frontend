<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>JEMI — Campus Marketplace | Shop Quality Products at LASU</title>
    <meta name="description" content="JEMI is the trusted marketplace for LASU students. Shop fashion, electronics, food & accessories with easy campus pickup at student-friendly prices." />
    <meta name="keywords" content="JEMI, LASU marketplace, campus shopping, student marketplace, Lagos State University, Iba, Nigeria ecommerce" />
    <meta name="author" content="JEMI" />
    <meta name="theme-color" content="#111827" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://jemi.ng/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://jemi.ng/" />
    <meta property="og:title" content="JEMI — Campus Marketplace | Shop Quality Products at LASU" />
    <meta property="og:description" content="Your trusted marketplace for quality products at student-friendly prices. Fashion, electronics, food & more with campus pickup." />
    <meta property="og:image" content="https://jemi.ng/og-image.png" />
    <meta property="og:site_name" content="JEMI" />
    <meta property="og:locale" content="en_NG" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://jemi.ng/" />
    <meta name="twitter:title" content="JEMI — Campus Marketplace" />
    <meta name="twitter:description" content="Shop quality products at student-friendly prices. Campus pickup at LASU." />
    <meta name="twitter:image" content="https://jemi.ng/og-image.png" />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "JEMI",
      "url": "https://jemi.ng",
      "logo": "https://jemi.ng/jemi.webp",
      "description": "Campus marketplace for LASU students — fashion, electronics, food & accessories with campus pickup",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Ojo",
        "addressRegion": "Lagos",
        "addressCountry": "NG"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": "English"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
